<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeployWave | 自动化镜像发布与部署工作台</title>
  <style>
    :root {
      --ink: #132033;
      --muted: #66758c;
      --line: #dce6f2;
      --paper: #ffffff;
      --soft: #f4f8fc;
      --brand: #0d9488;
      --brand-dark: #0f766e;
      --blue: #2563eb;
      --gold: #f59e0b;
      --danger: #ef4444;
      --radius: 8px;
      --shadow: 0 20px 50px rgba(19, 32, 51, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      line-height: 1.65;
      color: var(--ink);
      background: var(--paper);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .container {
      width: min(1160px, calc(100% - 40px));
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255, 255, 255, 0.92);
      border-bottom: 1px solid rgba(220, 230, 242, 0.9);
      backdrop-filter: blur(16px);
    }

    .nav {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 11px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--blue));
      box-shadow: 0 10px 24px rgba(13, 148, 136, 0.28);
    }

    .brand-mark svg {
      width: 23px;
      height: 23px;
    }

    .brand span {
      color: var(--brand);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
      color: #4b5b70;
      font-size: 15px;
      font-weight: 600;
    }

    .nav-links a:hover {
      color: var(--brand);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      padding: 0 20px;
      border: 1px solid transparent;
      border-radius: 7px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      font-family: inherit;
      font-size: 15px;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button-primary {
      color: #fff;
      background: var(--brand);
      box-shadow: 0 12px 28px rgba(13, 148, 136, 0.24);
    }

    .button-primary:hover {
      background: var(--brand-dark);
    }

    .button-ghost {
      color: var(--ink);
      background: #fff;
      border-color: var(--line);
    }

    .menu-button {
      display: none;
      width: 44px;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 92px 0 78px;
      background:
        radial-gradient(circle at 16% 18%, rgba(13, 148, 136, 0.16), transparent 28%),
        radial-gradient(circle at 84% 8%, rgba(37, 99, 235, 0.14), transparent 26%),
        linear-gradient(180deg, #f7fbff 0%, #ffffff 100%);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.02fr) minmax(420px, 0.98fr);
      gap: 54px;
      align-items: center;
    }

    .eyebrow {
      width: fit-content;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 11px;
      margin-bottom: 18px;
      border: 1px solid rgba(13, 148, 136, 0.25);
      border-radius: 999px;
      color: var(--brand-dark);
      background: rgba(13, 148, 136, 0.08);
      font-size: 13px;
      font-weight: 800;
    }

    .pulse {
